<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Page not found — Hassan Kamran</title>
  <meta name="robots" content="noindex">
  <link rel="icon" href="/favicon.ico" sizes="32x32">
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <meta name="theme-color" content="#F8FAFC">
  <script src="/static/theme.js?v=1"></script>
  <style>
    @font-face {
      font-family: "Exo 2";
      src: url("/static/Exo2-Regular.woff2") format("woff2");
      font-weight: 400 700;
      font-display: swap;
    }
    @font-face {
      font-family: "DM Sans";
      src: url("/static/DMSans-Regular.woff2") format("woff2");
      font-weight: 400;
      font-display: swap;
    }
    :root {
      color-scheme: light;
      --void: #F8FAFC; --ink: #0F172A; --text: #334155; --muted: #64748B;
      --border-2: #CBD5E1; --signal: #0F766E; --signal-hover: #115E59;
      --glow: #0F766E; --dot: #CBD5E1;
    }
    html[data-theme="dark"] {
      color-scheme: dark;
      --void: #0A0F1C; --ink: #F8FAFC; --text: #CBD5E1; --muted: #94A3B8;
      --border-2: #334155; --signal: #0D9488; --signal-hover: #14B8A6;
      --glow: #14B8A6; --dot: #22314b;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: var(--void); color: var(--text);
      font-family: "DM Sans", -apple-system, sans-serif;
      min-height: 100vh; display: flex; flex-direction: column;
    }
    .top { padding: 18px 24px; }
    .brand {
      font-family: "Exo 2", sans-serif; font-weight: 600; font-size: 1.05rem;
      color: var(--ink); text-decoration: none; letter-spacing: 0.02em;
    }
    .brand:hover { color: var(--glow); }
    main {
      flex: 1; display: flex; align-items: center; justify-content: center;
      text-align: center; padding: 24px; position: relative; overflow: hidden;
    }
    main::before {
      content: ""; position: absolute; inset: 0;
      background-image: radial-gradient(circle, var(--dot) 1px, transparent 1px);
      background-size: 32px 32px;
      mask-image: radial-gradient(420px circle at 50% 42%, black, transparent);
      -webkit-mask-image: radial-gradient(420px circle at 50% 42%, black, transparent);
      pointer-events: none;
    }
    .box { position: relative; }
    .code { font-family: "Exo 2", sans-serif; font-size: 5rem; font-weight: 700; color: var(--glow); line-height: 1; }
    h1 { font-family: "Exo 2", sans-serif; color: var(--ink); font-size: 1.4rem; margin: 14px 0 10px; }
    p { color: var(--muted); margin-bottom: 26px; }
    .actions { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
    a.btn {
      display: inline-block; padding: 11px 22px; border-radius: 10px;
      text-decoration: none; font-weight: 600;
      border: 1px solid transparent;
      transition: background 0.2s ease, border-color 0.2s ease, color 0.2s ease;
    }
    a.solid { background: var(--signal); color: #F8FAFC; }
    a.solid:hover { background: var(--signal-hover); }
    a.ghost { border-color: var(--border-2); color: var(--text); }
    a.ghost:hover { border-color: var(--glow); color: var(--ink); }
  </style>
</head>
<body>
  <div class="top"><a class="brand" href="/">Hassan Kamran</a></div>
  <main>
    <div class="box">
      <div class="code">404</div>
      <h1>This page doesn't exist</h1>
      <p>The old portfolio pages have been retired — everything now lives on one page.</p>
      <div class="actions">
        <a class="btn solid" href="/">Go to the homepage</a>
        <a class="btn ghost" href="/hassan-kamran-resume.pdf" download>Download résumé</a>
      </div>
    </div>
  </main>
</body>
</html>
