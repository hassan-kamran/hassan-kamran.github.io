<!doctype html>
<!-- Source for the favicon set (HK monogram on signal teal).
     Regenerate after editing (from repo root):
       "/Applications/Google Chrome.app/Contents/MacOS/Google Chrome" \
         --headless=new --disable-gpu --screenshot=/tmp/favicon-1024.png \
         --window-size=1024,1024 --default-background-color=00000000 \
         --hide-scrollbars --allow-file-access-from-files "file://$PWD/assets-src/favicon.html"
     then derive all sizes with the PIL snippet in CLAUDE.md (or ask Claude):
       favicon-{16,32,48,96,192,512}.png, favicon.png (=192), favicon.ico (16/32/48),
       apple-touch-icon.png (180, full-bleed on solid #0D9488).
     Keep static/favicon.svg's design in sync by hand. -->
<html>
<head>
<meta charset="utf-8">
<style>
  @font-face {
    font-family: 'Exo 2';
    src: url('../static/Exo2-Regular.woff2') format('woff2');
    font-weight: 400 700;
  }
  * { margin: 0; padding: 0; }
  html, body { width: 1024px; height: 1024px; background: transparent; overflow: hidden; }
  .tile {
    width: 1024px; height: 1024px;
    background: #0D9488; border-radius: 225px;
    display: flex; align-items: center; justify-content: center;
  }
  .tile span {
    font-family: 'Exo 2', sans-serif;
    font-weight: 700; font-size: 430px; color: #fff;
    letter-spacing: -0.05em;
    transform: translateY(-14px) translateX(-10px);
  }
</style>
</head>
<body>
  <div class="tile"><span>HK</span></div>
</body>
</html>
